# ===============================================================
# 13. 投资板块配置（Investment）
#
# 聚合财经 RSS + 行情数据，通过 AI 生成每日投资简报
# 支持 A股/港股/美股/加密货币，可配置关注的指数、概念、个股
#
# 邮件类型：Type C（定时推送）
#   - A股/港股档：中午 11:50 推送
#   - 美股档：晚上 23:00 推送（MVP 暂不启用）
# ===============================================================
investment:
  enabled: true                         # 是否启用投资板块

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 推送时间配置
  # 每天三次：早盘前(6:00)、午间(11:30)、收盘后(23:30)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  schedule:
    cn:
      enabled: true                     # A股/港股档
      times:                            # 多时间点触发
        - "06:00"                       # 早盘前
        - "11:30"                       # 午间
        - "23:30"                       # 收盘后
    us:
      enabled: false                    # 美股档（MVP 暂不启用）
      times:
        - "23:00"                       # 推送时间（北京时间）

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 关注的指数
  #
  # symbol 格式说明：
  #   - A股指数：sh000001（上证）、sz399001（深证）、sz399006（创业板）
  #   - 港股指数：HSI（恒生）、HSTECH（恒生科技）
  #   - 美股指数：.DJI（道琼斯）、.IXIC（纳斯达克）、.INX（标普500）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  indices:
    # A股指数（使用AKShare，稳定可用）
    - symbol: "sh000001"
      name: "上证指数"
      provider: "akshare"
    - symbol: "sz399001"
      name: "深证成指"
      provider: "akshare"
    - symbol: "sz399006"
      name: "创业板指"
      provider: "akshare"

    # 港股指数（使用yfinance）
    - symbol: "HSI"
      name: "恒生指数"
      provider: "yfinance"
    - symbol: "HSTECH"
      name: "恒生科技"
      provider: "yfinance"

    # 美股指数（使用yfinance）
    - symbol: "IXIC"
      name: "纳斯达克"
      provider: "yfinance"
    - symbol: "DJI"
      name: "道琼斯"
      provider: "yfinance"
    - symbol: "GSPC"
      name: "标普500"
      provider: "yfinance"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 关注的概念/板块关键词
  #
  # 用于：1. RSS 新闻过滤  2. AI 分析时重点关注
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  concepts:
    # === 人工智能 ===
    - "AI"
    - "人工智能"
    - "大模型"
    - "LLM"
    - "生成式AI"
    - "ChatGPT"
    - "算力"
    - "GPU"
    - "A100"
    - "H100"
    - "AI芯片"
