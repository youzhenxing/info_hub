      name: "贵州茅台"
    - symbol: "sz000001"
      name: "平安银行"
    # 港股/美股暂不支持（免费 API 不稳定）
    # - symbol: "09988"
    #   name: "阿里巴巴-SW"
    # - symbol: "NVDA"
    #   name: "英伟达"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 加密货币配置
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  crypto:
    enabled: true
    provider: "coingecko"           # 使用 CoinGecko API（免费且支持更多币种）
    symbols:
      - symbol: "bitcoin"
        name: "比特币"
      - symbol: "ethereum"
        name: "以太坊"
      - symbol: "solana"
        name: "Solana"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 数据源配置
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  sources:
    # 热榜财经新闻（从热榜数据库读取）
    hotlist:
      enabled: true
      # 从热榜数据库获取的财经源 ID
      platform_ids:
        - "wallstreetcn-hot"            # 华尔街见闻热榜
        - "cls-hot"                     # 财联社热门
      # 新闻最大条数
      max_news: 30

    # 金融专业 RSS 订阅（独立爬取）
    # 注意：部分国外源需要代理才能访问
    rss:
      enabled: true                     # 启用RSS源以获取更多专业资讯
      max_news: 30                      # 增加新闻条数
      max_age_days: 1                   # 只获取 1 天内的文章
      feeds:
        # === 宏观经济类 ===
        - id: "sina-macro"
          name: "新浪财经-宏观"
          url: "https://rsshub.app/sina/finance/5"
          enabled: true

        - id: "eeo"
          name: "经济观察网"
          url: "http://www.eeo.com.cn/sypd/rss/index.html"
          enabled: true

        - id: "investing-cn"
          name: "Investing.com中文"
          url: "https://cn.investing.com/rss/news.rss"
          enabled: true

        # === AI/机器人类 ===
        - id: "jiqizhixin"
          name: "机器之心"
          url: "https://www.jiqizhixin.com/rss"
          enabled: true

        - id: "huxiu-tech"
          name: "虎嗅-科技"
          url: "https://www.huxiu.com/rss/1.xml"
          enabled: true

        - id: "quantum-bit"
          name: "量子位"
          url: "https://rsshub.app/quantum-bit"
          enabled: true

        # === 国内财经媒体 RSS（需要 rsshub.app 可访问）===
        - id: "jin10"
          name: "金十数据"
          url: "https://rsshub.app/jin10"
          enabled: true

        - id: "eastmoney-news"
          name: "东方财富资讯"
          url: "https://rsshub.app/eastmoney/report/strategyreport"
          enabled: true

        - id: "caixin"
          name: "财新网"
          url: "https://rsshub.app/caixin/latest"
          enabled: false                # 付费内容较多

        # === 国际财经媒体 RSS（需要代理）===
        - id: "wsj-markets"
          name: "华尔街日报-市场"
          url: "https://feeds.wsj.com/wsj/xml/rss/3_7014.xml"
          enabled: false                # 需要代理

        - id: "bloomberg-markets"
          name: "彭博社-市场"
          url: "https://feeds.bloomberg.com/markets/news.rss"
          enabled: false                # 需要代理

        # === 加密货币资讯（需要代理）===
        - id: "coindesk"
          name: "CoinDesk"
          url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
          enabled: false                # 需要代理

        - id: "cointelegraph"
          name: "Cointelegraph"
          url: "https://cointelegraph.com/rss"
          enabled: false                # 需要代理

    # AKShare 行情数据
    akshare:
      enabled: true
      # 资金流数据
      money_flow:
        northbound: true                # 北向资金（沪股通+深股通）
        sector_flow: true               # 板块资金流向

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 代理配置（用于访问 rsshub.app 等需要代理的 RSS 源）
  # 策略：直连优先，失败时自动降级使用代理
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  proxy:
    enabled: true                           # 是否启用代理降级策略
    url: "http://host.docker.internal:7897" # Docker 容器内访问宿主机代理

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AI 分析配置
  #
  # 使用 AI 模型对行情数据和财经新闻进行综合分析
  # 生成结构化的每日投资简报
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  analysis:
    enabled: true                       # 是否启用 AI 分析
    language: "Chinese"                 # 输出语言
    
    # 分级处理配置（新增）
    fetch_content: true                 # 是否获取新闻正文
    max_articles: 10                    # 最多分析的文章数
    content_fetch_delay: 1.0            # 获取正文间隔（秒）
    
    # AI 模型配置（留空则使用全局 ai.* 配置）
    # 可单独配置以使用不同模型
    model: "openai/deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"    # 与播客相同的 DeepSeek 模型
    api_base: "https://api.siliconflow.cn/v1"
    api_key: "{{SILICONFLOW_API_KEY}}"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 推送配置
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  notification:
    enabled: true                       # 是否启用投资简报推送
    channels:
      email: true                       # 邮件推送（使用 notification.channels.email 配置）


# ===============================================================
# 14. 工作日志推送配置（Daily Log Report）
#
# 每天 23:30 发送当日监控日志汇总邮件
# 包含：播客处理记录、系统状态、错误日志等
# ===============================================================
daily_log_report:
  enabled: true                         # 是否启用工作日志推送
  schedule_time: "23:30"                # 推送时间（北京时间）
  
  # 日志来源
  log_sources:
    - type: "podcast"                   # 播客处理日志
      path: "output/podcast/"
    - type: "system"                    # 系统运行日志
      path: "logs/"
  
  # 邮件配置（使用 notification.channels.email 配置）
  notification:
    channels:
      email: true


# ===============================================================
# 15. 社区内容监控配置（Community）
#
# 监控 HackerNews、Reddit、Kickstarter、Twitter 等平台热点内容
# 通过 AI 智能筛选和分析，每天下午 6 点推送邮件
#
# 邮件类型：Type D（定时汇总推送）
# ===============================================================
community:
  enabled: true                           # 是否启用社区监控

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 代理配置（仅用于访问被墙网站：Reddit、Kickstarter 等）
  # 注意：
  #   1. 使用 HTTP 代理协议（不支持 SOCKS）
  #   2. AI API 调用不使用代理（代码中已禁用）
  #   3. 只有社区模块的网络请求会使用此代理
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  proxy:
    enabled: true                           # 是否启用代理
    url: "http://host.docker.internal:7897" # Docker 容器内访问宿主机代理

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 推送时间配置
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  schedule:
    enabled: true
    times:
      - "18:00"                           # 每天下午 6 点推送

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 重点关注话题（用于智能筛选和搜索）
  # 支持中英文，英文用于搜索，中文用于显示
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  topics:
    - "AI"
    - "LLM"
    - "AGI"
    - "机器人"
    - "AI硬件"
    - "创业"
    - "投资"
    - "robotics"
    - "startup"
    - "venture capital"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 数据源配置
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  sources:
    # HackerNews（Algolia Search API）
    hackernews:
      enabled: true
      max_items: 30                       # 最大返回条目数
      min_score: 10                       # 最低分数过滤
      max_age_hours: 24                   # 时间范围（小时）
      # search_keywords 默认使用 topics 中的英文关键词

    # Reddit（JSON API）
    reddit:
      enabled: true
      max_items: 50
      min_score: 5
      search_time: "day"                  # hour/day/week/month
      sort: "hot"                         # hot/new/top/relevance
      subreddits:                         # 关注的社区
        - name: "MachineLearning"
          limit: 15
        - name: "artificial"
          limit: 15
        - name: "robotics"
          limit: 10
        - name: "startups"
          limit: 10
        - name: "venturecapital"
          limit: 10

    # Twitter/X（RSS-Bridge）
    twitter:
      enabled: false                      # 默认关闭，需配置 bridge_url
      bridge_url: ""                      # RSS-Bridge 服务地址
                                          # 公共实例：https://rss-bridge.org/bridge01/
      accounts:                           # 关注的账号（不带 @）
        - "elonmusk"                      # 测试账号
      max_items: 30
      # search_queries 默认使用 topics 中的关键词

    # Kickstarter（Discover API）- 暂时禁用，等网络问题解决后启用
    kickstarter:
      enabled: false                      # 暂时禁用（超时问题待解决）
      max_items: 20
      sort: "magic"                       # magic/popularity/newest/most_funded
      categories:                         # 关注的分类
        - "technology"
        - "robots"
        - "hardware"
      # search_keywords 默认使用 topics 中的关键词

    # GitHub Trending（GitHub Search API）
    github:
      enabled: true
      max_items: 30
      min_stars: 10                       # 最低 star 数
      created_days: 7                     # 创建时间范围（天）
      topics:                             # 搜索主题
        - "ai"
        - "llm"
        - "machine-learning"
        - "robotics"
        - "deep-learning"

    # ProductHunt（RSS Feed）
    producthunt:
      enabled: true
      max_items: 20
      # 使用 RSS feed 获取每日热门产品

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AI 分析配置
  # 两阶段分析：1. AI 评分筛选 2. AI 深度分析
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  analysis:
    enabled: true
    prompt_file: "community_prompts.txt"  # 提示词文件（prompts 目录下）
    language: "Chinese"                   # 输出语言
    top_n: 30                             # 每个来源保留的 Top N 条目

    # AI 模型配置（统一使用 DeepSeek R1 推理模型）
    model: "openai/deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"
    api_base: "https://api.siliconflow.cn/v1"
    api_key: "{{SILICONFLOW_API_KEY}}"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 推送配置
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  notification:
    enabled: true
    channels:
      email: true                         # 邮件推送（使用 notification.channels.email 配置）
