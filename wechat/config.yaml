    - id: "jushenzhineng"
      name: "具身智能之心"
      wewe_feed_id: "MP_WXS_3948682571"
      enabled: true
    
    # 科技商业 (3个)
    - id: "huxiu"
      name: "虎嗅APP"
      wewe_feed_id: "MP_WXS_1432156401"
      enabled: true
    - id: "36kr"
      name: "36氪"
      wewe_feed_id: "MP_WXS_3264997043"
      enabled: true
    - id: "36krpro"
      name: "36氪Pro"
      wewe_feed_id: "MP_WXS_3519073339"
      enabled: true
    
    # 财经投资 (4个)
    - id: "maobidao"
      name: "猫笔刀"
      wewe_feed_id: "MP_WXS_3198966508"
      enabled: true
    - id: "kouzhao60s"
      name: "口罩哥研报60秒"
      wewe_feed_id: "MP_WXS_3215627432"
      enabled: true
    - id: "kazike"
