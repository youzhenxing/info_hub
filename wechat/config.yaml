# ═══════════════════════════════════════════════════════════════
#         微信公众号订阅模块 - 配置文件
# ═══════════════════════════════════════════════════════════════

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 测试模式配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
test:
  enabled: false  # 生产模式；如需测试可设置环境变量 TEST_MODE=true
  feed_limit: 3   # 测试时只处理前N个公众号
  # 可选：指定测试哪些公众号（优先级高于feed_limit）
  # test_feeds:
  #   - "新智元"
  #   - "量子位"
  #   - "机器之心"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 基础设置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
app:
  timezone: "Asia/Shanghai"
  debug: false
  
  # 环境标识：production | development
  # - production: 生产环境，正常使用 wewe-rss 服务同步文章
  # - development: 开发环境，使用 feeds API 缓存数据，不触发账号同步
  # 可通过环境变量 WECHAT_ENV 覆盖
  environment: "production"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Wewe-RSS 服务配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
wewe_rss:
  # 访问地址（本地测试用 localhost）
  base_url: "http://localhost:4000"
  # 外部访问地址（用于扫码登录提示）
  external_url: "http://localhost:4000"
  # 授权码（从环境变量读取，此处仅作为备用）
  auth_code: ""

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 账号监控配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
account_monitor:
  enabled: true
  # 检查间隔（小时）
  check_interval_hours: 6
  # 失效时发送邮件提醒
  alert_on_expire: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 推送时间配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
schedule:
  # 每日汇总推送时间
  daily_report_time: "23:00"
  
  # 分批采集策略（避免频繁请求被封禁）
  # batch_mode: true 启用分批模式
  # 批次 A：周一、三、五、日（星期 1,3,5,0）
  # 批次 B：周二、四、六（星期 2,4,6）
  batch_mode: true
  batch_a_days: [1, 3, 5, 0]    # 周一、三、五、日
  batch_b_days: [2, 4, 6]       # 周二、四、六

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AI 配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ⚠️  注意：以下配置已迁移至 config/system.yaml
#
# 如需修改 AI 配置，请编辑 config/system.yaml 的 ai 部分
# 或设置环境变量（推荐用于生产环境）：
#   export AI_API_KEY={{SILICONFLOW_API_KEY}}
#   export AI_API_BASE=https://api.siliconflow.cn/v1
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ai:
  # 使用硅基流动 DeepSeek R1 模型
  # openai/ 前缀强制 LiteLLM 使用 OpenAI 协议
  model: "openai/deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"

  # API 密钥（从 config/system.yaml 或环境变量读取）
  api_key: ""

  # 硅基流动 API 端点（从 config/system.yaml 或环境变量读取）
  api_base: ""

  # 请求超时（秒）
  timeout: 120

  # 最大生成 token 数
  max_tokens: 4000

  # 采样温度
  temperature: 0.7

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 邮件配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ⚠️  注意：以下配置已迁移至 config/system.yaml
#
# 如需修改邮件配置，请编辑 config/system.yaml 的 notification.channels.email 部分
# 或设置环境变量（推荐用于生产环境）：
#   export EMAIL_FROM=your_email@163.com
#   export EMAIL_PASSWORD=your_auth_code
#   export EMAIL_TO=recipient@example.com
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
email:
  # 发件人邮箱（从 config/system.yaml 或环境变量读取）
  from: ""

  # 邮箱授权码（从 config/system.yaml 或环境变量读取）
  password: ""

  # 收件人邮箱（从 config/system.yaml 或环境变量读取）
  to: ""

  # SMTP 服务器（可选，留空自动识别）
  smtp_server: ""

  # SMTP 端口（可选，留空自动识别）
  smtp_port: ""

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 数据采集配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
collector:
  # 每个公众号最多获取的文章数
  max_articles_per_feed: 10
  # 文章最大年龄（天），超过此天数的文章不获取
  max_age_days: 3
  # 请求间隔（秒），避免请求过于频繁
  request_interval: 2

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 公众号订阅列表
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
feeds:
  # ═══════════════════════════════════════════════════════════
  # 第一类：关键信息公众号
  # 
  # 处理方式：
  #   - 保留完整原文
  #   - AI 生成摘要
  #   - 邮件中展示：原文 + 摘要
  # 
  # 适用于：
  #   - 深度分析类文章
  #   - 原创观点类内容
  #   - 需要完整阅读的重要信息
  # ═══════════════════════════════════════════════════════════
  critical:
    # 示例配置（请替换为实际公众号）
    # - id: "guanyuanjian"           # 唯一标识（自定义）
    #   name: "观元鉴"                # 显示名称
    #   wewe_feed_id: "MP_WXS_xxx"   # Wewe-RSS 中的 feed ID
    #   enabled: true
    
    # - id: "caijing11"
    #   name: "财经十一人"
    #   wewe_feed_id: "MP_WXS_xxx"
    #   enabled: true

