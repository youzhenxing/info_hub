  #   - batch_b: 每周二、四、六 采集 (13个)
  # 
  # 每批按类型交叉分配，确保每天采集的内容覆盖所有领域
  # ═══════════════════════════════════════════════════════════
  
  # ─────────────────────────────────────────────────────────────
  # 批次 A：周一、三、五、日采集 (14个公众号)
  # ─────────────────────────────────────────────────────────────
  batch_a:
    # AI 科技 (3个)
    - id: "xinzhiyuan"
      name: "新智元"
      wewe_feed_id: "MP_WXS_3271041950"
      enabled: true
    - id: "liangziwei"
      name: "量子位"
      wewe_feed_id: "MP_WXS_3236757533"
      enabled: true
