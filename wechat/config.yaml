      enabled: true
    
    # 港美股 (1个)
    - id: "hkexnewlisting"
      name: "HK EX New-listing"
      wewe_feed_id: "MP_WXS_3964185270"
      enabled: true
    
    # 财经媒体 (1个)
    - id: "xueqiu"
