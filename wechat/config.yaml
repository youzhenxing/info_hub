# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 存储配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
storage:
  # 数据目录
  data_dir: "data"
  # 数据库文件名
  db_name: "wechat.db"
  # 输出目录（生成的邮件 HTML）
  output_dir: "data/output"
  # 数据保留天数（0=永久保留）
  retention_days: 30
